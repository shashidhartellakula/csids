<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { background:#090e1a; color:#ff3864; font-family:'Share Tech Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
